name: Java CI

on:
  push:
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: 'jdk+fx'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: never
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --parallel
        env:
          MICROSOFT_AUTH_ID: ${{ secrets.MICROSOFT_AUTH_ID }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      - name: Get short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: Rename artifacts
        run: |
          cd HMCL/build/libs/
          for file in ZPCH-*.jar ZPCH-*.exe ZPCH-*.sh ZPCH-*.deb; do
            if [ -f "$file" ]; then
              newname=$(echo "$file" | sed 's/^ZPCH-/ZPCH-/')
              if [ "$file" != "$newname" ]; then
                mv "$file" "$newname"
              fi
            fi
          done
          for file in HMCL-*.jar HMCL-*.exe HMCL-*.sh HMCL-*.deb; do
            if [ -f "$file" ]; then
              newname=$(echo "$file" | sed 's/^HMCL-/ZPCH-/')
              mv "$file" "$newname"
            fi
          done
      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: ZPCH-${{ env.SHORT_SHA }}-jar
          path: HMCL/build/libs/ZPCH-*.jar
          archive: false
      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: ZPCH-${{ env.SHORT_SHA }}-exe
          path: HMCL/build/libs/ZPCH-*.exe
          archive: false
      - name: Upload SH
        uses: actions/upload-artifact@v7
        with:
          name: ZPCH-${{ env.SHORT_SHA }}-sh
          path: HMCL/build/libs/ZPCH-*.sh
          archive: false
      - name: Upload DEB
        uses: actions/upload-artifact@v7
        with:
          name: ZPCH-${{ env.SHORT_SHA }}-deb
          path: HMCL/build/libs/ZPCH-*.deb
          archive: false