name: Java CI

on:
  push:
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: 'jdk+fx'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: never
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --parallel
        env:
          MICROSOFT_AUTH_ID: ${{ secrets.MICROSOFT_AUTH_ID }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

      - name: Get short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Rename artifacts
        run: |
          cd HMCL/build/libs/
          for file in ZPCH-*.jar ZPCH-*.exe ZPCH-*.sh ZPCH-*.deb; do
            if [ -f "$file" ]; then
              newname=$(echo "$file" | sed 's/^ZPCH-/ZPCH-/')
              if [ "$file" != "$newname" ]; then
                mv "$file" "$newname"
              fi
            fi
          done
          for file in HMCL-*.jar HMCL-*.exe HMCL-*.sh HMCL-*.deb; do
            if [ -f "$file" ]; then
              newname=$(echo "$file" | sed 's/^HMCL-/ZPCH-/')
              mv "$file" "$newname"
            fi
          done

      - name: Install Wine and rcedit
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine wine32 wine64
          # 下载 rcedit
          wget https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe
          chmod +x rcedit-x64.exe

      - name: Replace exe icon with rcedit
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          EXE_FILE=$(ls HMCL/build/libs/ZPCH-*.exe | head -n 1)
          if [ -z "$EXE_FILE" ]; then
            echo "未找到 exe 文件，跳过图标替换"
            exit 0
          fi
          ICON_FILE="HMCL/image/hmcl.ico"
          if [ ! -f "$ICON_FILE" ]; then
            echo "警告：图标文件 $ICON_FILE 不存在，跳过替换"
            exit 0
          fi
          # 使用 wine 运行 rcedit
          wine rcedit-x64.exe "$EXE_FILE" --set-icon "$ICON_FILE"
          echo "图标替换完成"

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: ZPCH-${{ env.SHORT_SHA }}-jar
          path: HMCL/build/libs/ZPCH-*.jar
          archive: false

      - name: Upload EXE
        uses: actions/upload-artifact@v7
        with:
          name: ZPCH-${{ env.SHORT_SHA }}-exe
          path: HMCL/build/libs/ZPCH-*.exe
          archive: false

      - name: Upload SH
        uses: actions/upload-artifact@v7
        with:
          name: ZPCH-${{ env.SHORT_SHA }}-sh
          path: HMCL/build/libs/ZPCH-*.sh
          archive: false

      - name: Upload DEB
        uses: actions/upload-artifact@v7
        with:
          name: ZPCH-${{ env.SHORT_SHA }}-deb
          path: HMCL/build/libs/ZPCH-*.deb
          archive: false