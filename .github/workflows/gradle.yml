name: Java CI

on:
  push:
  pull_request:
    paths-ignore:
      - '**.md'

# 关键：给 GITHUB_TOKEN 添加写入权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ... (前面所有步骤保持不变，直到 Upload DEB 之后)

      # 修正后的版本提取步骤
      - name: Extract version from artifacts
        id: extract_version
        run: |
          # 查找任意一个 ZPCH-*.jar 文件
          JAR_FILE=$(ls HMCL/build/libs/ZPCH-*.jar 2>/dev/null | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "未找到产物文件，跳过发布"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # 提取文件名中的版本部分：去掉 ZPCH- 前缀和 .jar 后缀
          # 例如 ZPCH-1.0.dev-ff9daee-Dev.jar -> 1.0.dev-ff9daee-Dev
          VERSION=$(basename "$JAR_FILE" | sed -E 's/^ZPCH-(.+)\.jar$/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "提取到版本号: $VERSION"
      - name: Check if release exists
        id: check_release
        run: |
          VERSION=${{ steps.extract_version.outputs.version }}
          if [ -z "$VERSION" ] || [ "${{ steps.extract_version.outputs.skip }}" == "true" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "reason=版本号无效或产物缺失" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG_NAME="v$VERSION"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG_NAME")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "reason=Release 版本 $TAG_NAME 已存在" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Prerelease
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_release.outputs.tag }}
          name: 测试版 ${{ steps.extract_version.outputs.version }}
          body: |
            自动构建的预发布版本
            - 基于提交: ${{ github.sha }}
            - 触发分支: ${{ github.ref_name }}
            - 触发事件: ${{ github.event_name }}
          prerelease: true
          draft: false
          files: |
            HMCL/build/libs/ZPCH-*.jar
            HMCL/build/libs/ZPCH-*.exe
            HMCL/build/libs/ZPCH-*.sh
            HMCL/build/libs/ZPCH-*.deb
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output skip reason
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "跳过发布: ${{ steps.check_release.outputs.reason }}"