name: Create Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: '发布类型'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - prerelease
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  check-update:
    if: ${{ github.repository_owner == 'BaiYing0323' }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - channel: dev
            task: checkUpdateDev
          - channel: stable
            task: checkUpdateStable
    runs-on: ubuntu-latest
    name: check-update-${{ matrix.channel }}
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 设置 JDK 环境
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 检查最新版本
        run: ./gradlew ${{ matrix.task }} --no-daemon --info --stacktrace

      - name: 检查版本是否已发布
        run: if [ -z "$(git tag -l "$ZPCH_TAG_NAME")" ]; then echo "continue=true" >> $GITHUB_ENV; fi

      # 下载构建产物文件（从 Java CI 工作流产物下载）
      - name: 获取最新工作流产物
        if: ${{ env.continue == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: ZPCH-*-jar
          path: ./downloads
        continue-on-error: true

      - name: 下载发布文件
        if: ${{ env.continue == 'true' }}
        run: |
          cd ./downloads || mkdir -p ./downloads && cd ./downloads
          
          # 从 ZPCH_CI_DOWNLOAD_BASE_URI 下载或从产物中获取
          if [ -n "$ZPCH_CI_DOWNLOAD_BASE_URI" ]; then
            wget "$ZPCH_CI_DOWNLOAD_BASE_URI/ZPCH-$ZPCH_VERSION.exe" || true
            wget "$ZPCH_CI_DOWNLOAD_BASE_URI/ZPCH-$ZPCH_VERSION.exe.sha256" || true
            wget "$ZPCH_CI_DOWNLOAD_BASE_URI/ZPCH-$ZPCH_VERSION.jar" || true
            wget "$ZPCH_CI_DOWNLOAD_BASE_URI/ZPCH-$ZPCH_VERSION.jar.sha256" || true
            wget "$ZPCH_CI_DOWNLOAD_BASE_URI/ZPCH-$ZPCH_VERSION.sh" || true
            wget "$ZPCH_CI_DOWNLOAD_BASE_URI/ZPCH-$ZPCH_VERSION.sh.sha256" || true
            wget "$ZPCH_CI_DOWNLOAD_BASE_URI/ZPCH-$ZPCH_VERSION.deb" || true
            wget "$ZPCH_CI_DOWNLOAD_BASE_URI/ZPCH-$ZPCH_VERSION.deb.sha256" || true
          fi
          
          # 查找本地产物中的文件
          find . -name "ZPCH-*.jar" -exec cp {} ./ZPCH-$ZPCH_VERSION.jar \;
          find . -name "ZPCH-*.exe" -exec cp {} ./ZPCH-$ZPCH_VERSION.exe \;
          find . -name "ZPCH-*.sh" -exec cp {} ./ZPCH-$ZPCH_VERSION.sh \;
          find . -name "ZPCH-*.deb" -exec cp {} ./ZPCH-$ZPCH_VERSION.deb \;
          
          ls -la

      # 生成 SHA256 校验和
      - name: 生成 SHA256 校验和
        if: ${{ env.continue == 'true' }}
        run: |
          cd ./downloads
          for file in ZPCH-$ZPCH_VERSION.*; do
            if [ -f "$file" ] && [[ ! "$file" == *.sha256 ]]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      # 校验文件完整性
      - name: 校验文件安全性
        if: ${{ env.continue == 'true' }}
        run: |
          cd ./downloads
          
          if [ -f "ZPCH-$ZPCH_VERSION.jar.sha256" ]; then
            export JAR_SHA256=$(cat ZPCH-$ZPCH_VERSION.jar.sha256 | awk '{print $1}')
            echo "$JAR_SHA256  ZPCH-$ZPCH_VERSION.jar" | sha256sum -c
          fi
          
          if [ -f "ZPCH-$ZPCH_VERSION.exe.sha256" ]; then
            export EXE_SHA256=$(cat ZPCH-$ZPCH_VERSION.exe.sha256 | awk '{print $1}')
            echo "$EXE_SHA256  ZPCH-$ZPCH_VERSION.exe" | sha256sum -c
          fi
          
          if [ -f "ZPCH-$ZPCH_VERSION.sh.sha256" ]; then
            export SH_SHA256=$(cat ZPCH-$ZPCH_VERSION.sh.sha256 | awk '{print $1}')
            echo "$SH_SHA256  ZPCH-$ZPCH_VERSION.sh" | sha256sum -c
          fi
          
          if [ -f "ZPCH-$ZPCH_VERSION.deb.sha256" ]; then
            export DEB_SHA256=$(cat ZPCH-$ZPCH_VERSION.deb.sha256 | awk '{print $1}')
            echo "$DEB_SHA256  ZPCH-$ZPCH_VERSION.deb" | sha256sum -c
          fi

      # 生成发布说明
      - name: 生成 Release 说明
        if: ${{ env.continue == 'true' }}
        run: |
          cd ./downloads
          
          RELEASE_NOTE="## ZPCH $ZPCH_VERSION\n\n"
          RELEASE_NOTE+="### 更新内容\n\n*待补充*\n\n"
          RELEASE_NOTE+="### 文件校验和\n\n"
          RELEASE_NOTE+="| 文件 | SHA-256 校验和 |\n"
          RELEASE_NOTE+="| --- | --- |\n"
          
          if [ -f "ZPCH-$ZPCH_VERSION.exe" ]; then
            EXE_SHA=$(cat ZPCH-$ZPCH_VERSION.exe.sha256 | awk '{print $1}')
            RELEASE_NOTE+="| [ZPCH-$ZPCH_VERSION.exe]($GH_DOWNLOAD_BASE_URL/v$ZPCH_VERSION/ZPCH-$ZPCH_VERSION.exe) | \`$EXE_SHA\` |\n"
          fi
          
          if [ -f "ZPCH-$ZPCH_VERSION.jar" ]; then
            JAR_SHA=$(cat ZPCH-$ZPCH_VERSION.jar.sha256 | awk '{print $1}')
            RELEASE_NOTE+="| [ZPCH-$ZPCH_VERSION.jar]($GH_DOWNLOAD_BASE_URL/v$ZPCH_VERSION/ZPCH-$ZPCH_VERSION.jar) | \`$JAR_SHA\` |\n"
          fi
          
          if [ -f "ZPCH-$ZPCH_VERSION.sh" ]; then
            SH_SHA=$(cat ZPCH-$ZPCH_VERSION.sh.sha256 | awk '{print $1}')
            RELEASE_NOTE+="| [ZPCH-$ZPCH_VERSION.sh]($GH_DOWNLOAD_BASE_URL/v$ZPCH_VERSION/ZPCH-$ZPCH_VERSION.sh) | \`$SH_SHA\` |\n"
          fi
          
          if [ -f "ZPCH-$ZPCH_VERSION.deb" ]; then
            DEB_SHA=$(cat ZPCH-$ZPCH_VERSION.deb.sha256 | awk '{print $1}')
            RELEASE_NOTE+="| [ZPCH-$ZPCH_VERSION.deb]($GH_DOWNLOAD_BASE_URL/v$ZPCH_VERSION/ZPCH-$ZPCH_VERSION.deb) | \`$DEB_SHA\` |\n"
          fi
          
          RELEASE_NOTE+="\n### 安装说明\n\n"
          RELEASE_NOTE+="- **Windows**: 使用 \`.exe\` 文件\n"
          RELEASE_NOTE+="- **Linux**: 使用 \`.sh\` 脚本或 \`.deb\` 安装包\n"
          RELEASE_NOTE+="- **跨平台**: 使用 \`.jar\` 文件（需要 Java 17+）\n"
          RELEASE_NOTE+="\n---\n*此版本由 GitHub Actions 自动构建*"
          
          echo -e "$RELEASE_NOTE" > RELEASE_NOTE.md

        env:
          GH_DOWNLOAD_BASE_URL: https://github.com/${{ github.repository }}/releases/download

      # ==============================================
      # 逻辑：自动触发=测试版，手动触发可选正式版/测试版
      # ==============================================
      - name: 设置发布类型（正式版/测试版）
        if: ${{ env.continue == 'true' }}
        run: |
          # 自动触发（Java CI 完成）→ 预发布/测试版
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "PRERELEASE=true" >> $GITHUB_ENV
            echo "RELEASE_TITLE=ZPCH $ZPCH_VERSION (测试版)" >> $GITHUB_ENV
          # 手动触发
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.release-type }}" == "stable" ]; then
              echo "PRERELEASE=false" >> $GITHUB_ENV
              echo "RELEASE_TITLE=ZPCH $ZPCH_VERSION (正式版)" >> $GITHUB_ENV
            else
              echo "PRERELEASE=true" >> $GITHUB_ENV
              echo "RELEASE_TITLE=ZPCH $ZPCH_VERSION (测试版)" >> $GITHUB_ENV
            fi
          fi

      # 创建 GitHub 发布（正式版/测试版）
      - name: 创建 GitHub Release
        if: ${{ env.continue == 'true' }}
        run: |
          cd ./downloads
          
          # 构建文件数组
          FILES=()
          [ -f "ZPCH-$ZPCH_VERSION.exe" ] && FILES+=("ZPCH-$ZPCH_VERSION.exe")
          [ -f "ZPCH-$ZPCH_VERSION.exe.sha256" ] && FILES+=("ZPCH-$ZPCH_VERSION.exe.sha256")
          [ -f "ZPCH-$ZPCH_VERSION.jar" ] && FILES+=("ZPCH-$ZPCH_VERSION.jar")
          [ -f "ZPCH-$ZPCH_VERSION.jar.sha256" ] && FILES+=("ZPCH-$ZPCH_VERSION.jar.sha256")
          [ -f "ZPCH-$ZPCH_VERSION.sh" ] && FILES+=("ZPCH-$ZPCH_VERSION.sh")
          [ -f "ZPCH-$ZPCH_VERSION.sh.sha256" ] && FILES+=("ZPCH-$ZPCH_VERSION.sh.sha256")
          [ -f "ZPCH-$ZPCH_VERSION.deb" ] && FILES+=("ZPCH-$ZPCH_VERSION.deb")
          [ -f "ZPCH-$ZPCH_VERSION.deb.sha256" ] && FILES+=("ZPCH-$ZPCH_VERSION.deb.sha256")
          
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "没有找到任何发布文件"
            exit 1
          fi
          
          gh release create "${{ env.ZPCH_TAG_NAME }}" \
            "${FILES[@]}" \
            --target "${{ github.sha }}" \
            --title "${{ env.RELEASE_TITLE }}" \
            --notes-file RELEASE_NOTE.md \
            --prerelease=${{ env.PRERELEASE }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 清理临时文件
      - name: 清理临时文件
        if: always()
        run: |
          rm -rf ./downloads