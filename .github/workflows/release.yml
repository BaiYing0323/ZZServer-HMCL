name: Upload to Release

on:
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - release
      prerelease:
        description: 'Mark as prerelease (if release type is release, this is ignored)'
        required: false
        default: true
        type: boolean

jobs:
  upload-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Get latest successful workflow run
        id: get_workflow
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "MANUAL_TRIGGER=true" >> $GITHUB_ENV
          else
            echo "MANUAL_TRIGGER=false" >> $GITHUB_ENV
          fi
          
          # Get the latest successful workflow run for Java CI
          WORKFLOW_RUN=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/Java%20CI.yml/runs?status=success&per_page=1")
          
          RUN_ID=$(echo $WORKFLOW_RUN | jq -r '.workflow_runs[0].id')
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" == "null" ]; then
            echo "No successful Java CI workflow run found"
            exit 1
          fi
          
          echo "Found workflow run ID: $RUN_ID"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ env.RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifacts

      - name: Extract version from artifact filename
        id: extract_version
        run: |
          cd ./artifacts
          
          # Find any ZPCH-* file to extract version
          ARTIFACT_FILE=$(find . -name "ZPCH-*.jar" -o -name "ZPCH-*.exe" -o -name "ZPCH-*.sh" -o -name "ZPCH-*.deb" | head -1)
          
          if [ -z "$ARTIFACT_FILE" ]; then
            echo "No ZPCH artifact found"
            exit 1
          fi
          
          BASENAME=$(basename "$ARTIFACT_FILE")
          # Extract version between ZPCH- and the suffix (e.g., ZPCH-1.0.0.jar -> 1.0.0)
          VERSION=$(echo "$BASENAME" | sed -n 's/^ZPCH-\([^-]*\)-.*\.\(jar\|exe\|sh\|deb\)$/\1/p')
          
          # Try alternative pattern if above doesn't match (e.g., ZPCH-1.0.0.jar without extra dash)
          if [ -z "$VERSION" ]; then
            VERSION=$(echo "$BASENAME" | sed -n 's/^ZPCH-\(.*\)\.\(jar\|exe\|sh\|deb\)$/\1/p')
          fi
          
          if [ -z "$VERSION" ]; then
            echo "Could not extract version from filename: $BASENAME"
            exit 1
          fi
          
          echo "Extracted version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate release description
        id: generate_description
        run: |
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ env.RUN_ID }}"
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TRIGGER_TYPE="手动触发"
            if [[ "${{ github.event.inputs.release_type }}" == "release" ]]; then
              RELEASE_TYPE="正式版"
            else
              RELEASE_TYPE="预发行版"
            fi
          else
            TRIGGER_TYPE="自动触发 (Java CI 完成)"
            RELEASE_TYPE="预发行版"
          fi
          
          DESCRIPTION=$(cat << EOF
          ## ZPCH ${{ env.VERSION }}
          
          ### 发布信息
          - **版本号**: ${{ env.VERSION }}
          - **触发方式**: $TRIGGER_TYPE
          - **发布类型**: $RELEASE_TYPE
          - **构建时间**: $TIMESTAMP
          - **源工作流**: [Java CI #${{ env.RUN_ID }}]($RUN_URL)
          
          ### 包含的产物
          - JAR 文件
          - EXE 可执行文件
          - Shell 脚本
          - DEB 安装包
          
          ### 更新内容
          *待补充*
          
          ### 安装说明
          请根据您的操作系统选择合适的文件：
          - Windows: 使用 `.exe` 文件
          - Linux: 使用 `.sh` 脚本或 `.deb` 安装包
          - 跨平台: 使用 `.jar` 文件（需要 Java 17+）
          
          ---
          *此版本由 GitHub Actions 自动构建*
          EOF
          )
          
          # Save description to file to avoid escaping issues
          echo "$DESCRIPTION" > description.txt
          echo "DESCRIPTION_FILE=description.txt" >> $GITHUB_ENV

      - name: Determine release type
        id: release_type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.release_type }}" == "release" ]]; then
              echo "PRERELEASE=false" >> $GITHUB_ENV
              echo "RELEASE_NAME=ZPCH ${{ env.VERSION }}" >> $GITHUB_ENV
            else
              echo "PRERELEASE=true" >> $GITHUB_ENV
              echo "RELEASE_NAME=ZPCH ${{ env.VERSION }} (Pre-release)" >> $GITHUB_ENV
            fi
          else
            # Automatic trigger - always prerelease
            echo "PRERELEASE=true" >> $GITHUB_ENV
            echo "RELEASE_NAME=ZPCH ${{ env.VERSION }} (Pre-release - Auto)" >> $GITHUB_ENV
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: ${{ env.RELEASE_NAME }}
          body_path: ${{ env.DESCRIPTION_FILE }}
          prerelease: ${{ env.PRERELEASE == 'true' }}
          draft: false
          files: |
            ./artifacts/**/ZPCH-*.jar
            ./artifacts/**/ZPCH-*.exe
            ./artifacts/**/ZPCH-*.sh
            ./artifacts/**/ZPCH-*.deb
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}